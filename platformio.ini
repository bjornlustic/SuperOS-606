; SuperOS-606 — open TR-606 firmware for the Teensy++ 2.0 (AT90USB1286)
; Build: PlatformIO.  `pio run`  -> builds app + bootloader, packs a flashable .syx
; NOTE: the post-build scripts call `git rev-parse`, so this must be a git repo (run `git init`).
[platformio]
src_dir = src
default_envs = app, bootloader

[env]
custom_project_version = 0.1-alpha

; ---- main firmware ----
[env:app]
framework = arduino
platform = teensy
board = teensy2pp
board_build.f_cpu = 4000000L
build_flags =
  -Wl,--section-start=.text=0x0000
build_src_filter = +<*> -<bootloader/*> -<flash_service/*>
extra_scripts = post:tools/makesyx.py

; ---- SPM flash-write service (install once per board) ----
; Lives at byte 0x1FE00 (pages 0x1FE-0x1FF), the empty top of the boot section,
; well above the running bootloader. Build emits service-install.syx; flash it
; via SysEx in bootloader mode once, and patterns persist across power-off.
[env:flash-service]
build_src_filter = +<flash_service/*>
platform = atmelavr
board_build.mcu = at90usb1286
board_build.f_cpu = 4000000L
framework =
build_flags =
    -Os
    -Wl,--entry=flash_service_entry
    -Wl,--section-start=.service_entry=0x1FE00
    -Wl,--section-start=.text=0x1FE40
extra_scripts =
    pre:tools/flash_service_link.py
    post:tools/make_service_syx.py

; same as app, but with USB serial + DEBUG for bench testing over USB
[env:app-debug]
extends = env:app
build_flags =
  -DUSB_SERIAL
  -DDEBUG=1
  -Wl,--section-start=.text=0x0000

; ---- MIDI SysEx bootloader (lives at 0x1F000) ----
[env:bootloader]
build_src_filter = +<bootloader/*>
platform = atmelavr
platform_packages = tool-sreccat
board_build.mcu = at90usb1286
board_build.f_cpu = 4000000L
upload_protocol = teensy-cli
framework =
build_flags =
    -Os
    -Wl,--section-start=.text=0x1F000
    -nostartfiles
    -nostdlib
    -ffunction-sections
    -fdata-sections
    -Wl,--gc-sections
upload_flags = -p at90usb1286
upload_command =
    avrdude -c usbasp -p at90usb1286
    -U flash:w:$SOURCE:i
extra_scripts = post:tools/merge_firmware.py

; ---- fuses (only when flashing a blank chip via ISP) ----
[env:fuses]
platform = atmelavr
board_build.mcu = at90usb1286
upload_protocol = usbasp
; lfuse 0xDF: external crystal, no /8, CKOUT OFF (bit6=1). The old 0x9F had CKOUT
; ON, which routes the system clock onto PC7 — and on the 606 PC7 is the ACCENT
; line (PF3 / socket pin 19). That overrides the GPIO and forces every hit accented.
upload_command =
    avrdude -c usbasp -p at90usb1286
    -U lfuse:w:0xDF:m
    -U hfuse:w:0xDA:m
    -U efuse:w:0xF8:m
