; SuperOS-606 — open TR-606 firmware for the µPD650 CPU-replacement board (AT90USB1286)
; Build: PlatformIO.  `pio run`  -> builds app + bootloader, packs a flashable .syx
; NOTE: the post-build scripts call `git rev-parse`, so this must be a git repo (run `git init`).
[platformio]
src_dir = src
default_envs = app, bootloader

[env]
custom_project_version = 0.1-alpha

; ---- main firmware ----
[env:app]
framework = arduino
platform = teensy
board = teensy2pp
board_build.f_cpu = 4000000L
build_flags =
  -Wl,--section-start=.text=0x0000
build_src_filter = +<*> -<bootloader/*>
extra_scripts = post:tools/makesyx.py

; same as app, but with USB serial + DEBUG for bench testing over USB
[env:app-debug]
extends = env:app
build_flags =
  -DUSB_SERIAL
  -DDEBUG=1
  -Wl,--section-start=.text=0x0000

; ---- MIDI SysEx bootloader (lives at 0x1F000) ----
[env:bootloader]
build_src_filter = +<bootloader/*>
platform = atmelavr
platform_packages = tool-sreccat
board_build.mcu = at90usb1286
board_build.f_cpu = 4000000L
upload_protocol = teensy-cli
framework =
build_flags =
    -Os
    -Wl,--section-start=.text=0x1F000
    -nostartfiles
    -nostdlib
    -ffunction-sections
    -fdata-sections
    -Wl,--gc-sections
upload_flags = -p at90usb1286
upload_command =
    avrdude -c usbasp -p at90usb1286
    -U flash:w:$SOURCE:i
extra_scripts = post:tools/merge_firmware.py

; ---- fuses (only when flashing a blank chip via ISP) ----
[env:fuses]
platform = atmelavr
board_build.mcu = at90usb1286
upload_protocol = usbasp
upload_command =
    avrdude -c usbasp -p at90usb1286
    -U lfuse:w:0x9F:m
    -U hfuse:w:0xDA:m
    -U efuse:w:0xF8:m
